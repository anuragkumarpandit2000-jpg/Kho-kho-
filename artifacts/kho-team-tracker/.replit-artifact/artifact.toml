kind = "web"
previewPath = "/kho-team-tracker/"
title = "Kho-Kho Team Tracker"
version = "1.0.0"
id = "artifacts/kho-team-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/kho-team-tracker/" ]
localPort = 18259

[services.development]
run = "pnpm --filter @workspace/kho-team-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kho-team-tracker", "run", "build" ]
publicDir = "artifacts/kho-team-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18259"
BASE_PATH = "/kho-team-tracker/"
